<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="header">
    <h1>News Dashboard</h1>

    <div class="top-right">
      <span>Latest News</span>
      <span id="currentDate"></span>
    </div>
  </div>

  <div class="row featured">

    <div class="col-lg-8">
      <img id="featuredImage" class="img-fluid d-none">
    </div>

    <div class="col-lg-4 box">

      <p id="featuredSource" class="hidden"></p>

      <h2 id="featuredTitle"></h2>
      <p id="featuredText"></p>
      <a id="featuredLink" target="_blank">Read More ></a>
    </div>

  </div>

  <div class="row main">

    <div class="col-lg-4 left">

      <div class="section">
        <h3>Current Weather</h3>

        <p id="weatherCity"></p>

        <div class="temp">
          <span id="weatherIcon"></span>
          <span id="weatherTemp"></span>
        </div>

        <p id="weatherCondition"></p>

        <p id="weatherError" class="hidden"></p>
      </div>

      <div class="section">
        <h3>Currency Rates</h3>

        <div class="line">
          <span>USD / EUR</span>
          <span id="rateEUR"></span>
        </div>

        <div class="line">
          <span>USD / GBP</span>
          <span id="rateGBP"></span>
        </div>

        <div class="line">
          <span>USD / JPY</span>
          <span id="rateJPY"></span>
        </div>

        <p id="currencyError" class="hidden"></p>
      </div>

    </div>

    <div class="col-lg-8 right">

      <h3>Latest News</h3>
      
      <p id="newsError" class="hidden"></p>

      <div class="row">

        <div class="col-md-6 item">
          <p id="article1Source" class="hidden"></p>
          <p id="article1Text" class="hidden"></p>
          <a id="article1Link" target="_blank">
            <span id="article1Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article2Source" class="hidden"></p>
          <p id="article2Text" class="hidden"></p>
          <a id="article2Link" target="_blank">
            <span id="article2Title"></span> 
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article3Source" class="hidden"></p>
          <p id="article3Text" class="hidden"></p>
          <a id="article3Link" target="_blank">
            <span id="article3Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article4Source" class="hidden"></p>
          <p id="article4Text" class="hidden"></p>
          <a id="article4Link" target="_blank">
            <span id="article4Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article5Source" class="hidden"></p>
          <p id="article5Text" class="hidden"></p>
          <a id="article5Link" target="_blank">
            <span id="article5Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article6Source" class="hidden"></p>
          <p id="article6Text" class="hidden"></p>
          <a id="article6Link" target="_blank">
            <span id="article6Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article7Source" class="hidden"></p>
          <p id="article7Text" class="hidden"></p>
          <a id="article7Link" target="_blank">
            <span id="article7Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article8Source" class="hidden"></p>
          <p id="article8Text" class="hidden"></p>
          <a id="article8Link" target="_blank">
            <span id="article8Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article9Source" class="hidden"></p>
          <p id="article9Text" class="hidden"></p>
          <a id="article9Link" target="_blank">
            <span id="article9Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

        <div class="col-md-6 item">
          <p id="article10Source" class="hidden"></p>
          <p id="article10Text" class="hidden"></p>
          <a id="article10Link" target="_blank">
            <span id="article10Title"></span>
            <span class="arrow"></span>
          </a>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
