<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 mb-4">
    <h1 class="h3 m-0 title">News Dashboard</h1>

    <div class="d-flex gap-4 small">
      <span>Latest News</span>
      <span id="currentDate"></span>
    </div>
  </div>

  <div class="row mb-4">

    <div class="col-lg-8">
      <img id="featuredImage" class="img-fluid rounded-start w-100 h-100 d-none featured-img">
    </div>

    <div class="col-lg-4 p-4 rounded-end shadow feature-box">
      <p id="featuredSource" class="hidden"></p>

      <h2 id="featuredTitle" class="h5"></h2>
      <p id="featuredText" class="small"></p>
      <a id="featuredLink" class="text-decoration-none">Read More ></a>
    </div>

  </div>

  <div class="row border-top border-dark pt-3">

    <div class="col-lg-4 border-end border-dark pe-4">

      <div class="mb-4">
        <h3 class="h6 border-bottom border-dark pb-1 mb-3">Current Weather</h3>

        <p id="weatherCity" class="small city"></p>

        <div class="d-flex align-items-center gap-2">
          <span id="weatherIcon"></span>
          <span id="weatherTemp" class="temp"></span>
        </div>

        <p id="weatherCondition" class="small"></p>
        <p id="weatherError" class="hidden"></p>
      </div>

      <div>
        <h3 class="h6 border-bottom border-dark pb-1 mb-3">Currency Rates</h3>

        <div class="d-flex justify-content-between border-bottom border-dark py-2">
          <span class="rate-label">USD / EUR</span>
          <span id="rateEUR"></span>
        </div>

        <div class="d-flex justify-content-between border-bottom border-dark py-2">
          <span class="rate-label">USD / GBP</span>
          <span id="rateGBP"></span>
        </div>

        <div class="d-flex justify-content-between border-bottom border-dark py-2">
          <span class="rate-label">USD / JPY</span>
          <span id="rateJPY"></span>
        </div>

        <p id="currencyError" class="hidden"></p>
      </div>

    </div>

    <div class="col-lg-8 ps-4">

      <h3 class="h6 border-bottom border-dark pb-1 mb-3">Latest News</h3>
      <p id="newsError" class="hidden"></p>

      <div class="row g-4">

        <div class="col-md-6">
          <p id="article1Source" class="hidden"></p>
          <p id="article1Text" class="hidden"></p>

          <a id="article1Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article1Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article2Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article2Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article3Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article3Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article4Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article4Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article5Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article5Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article6Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article6Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article7Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article7Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article8Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article8Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article9Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article9Title"></span>
            <span class="arrow">></span>
          </a>

          <a id="article10Link" class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 text-decoration-none article">
            <span id="article10Title"></span>
            <span class="arrow">></span>
          </a>
        </div>
        
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
